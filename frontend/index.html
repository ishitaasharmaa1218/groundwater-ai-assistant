<!DOCTYPE html>
<html>
<head>
<title>Groundwater AI Dashboard</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:70%;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#result{
margin-top:20px;
white-space:pre-wrap;
}
</style>

</head>

<body>

<div class="container">

<h2>Groundwater AI Assistant</h2>

<input id="question" placeholder="Ask about groundwater in Pune...">

<button onclick="askAI()">Ask</button>

<div id="result"></div>

</div>

<script>

async function askAI(){

const question = document.getElementById("question").value

const response = await fetch(
`http://127.0.0.1:8000/ask?question=${question}`
)

const data = await response.json()

document.getElementById("result").innerText =
data.answer

}

</script>

</body>
</html>
